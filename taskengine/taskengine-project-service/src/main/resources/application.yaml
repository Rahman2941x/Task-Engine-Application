server:
  port: 8082




rabbitmq:
  exchange: ${RABBITMQ_EXCHANGE}
  queue: ${RABBITMQ_PROJECT_TASK_QUEUE}
  routingKey: ${RABBITMQ_ROUTING_KEY}

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  application:
    name: taskengine-project-service

  rabbitmq:
    listener:
      simple:
        default-requeue-rejected: false

  jackson:
    deserialization:
      fail-on-unknown-properties: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/auth/api/v1/.well-known/jwks.json

      client:
        registration:
          internal-client:
            provider: internal-provider
            client-id: ${PROJECT_SERVICE_CLIENTID}
            client-secret: ${PROJECT_SERVICE_CLIENTSECRET}
            #client-id: Project-Service
            #client-secret: Project-Service-0003
            authorization-grant-type: client_credentials
            client-authentication-method: client_secret_basic
            #client-authentication-method: client_secret_post
            scope: read ,write
        provider:
          internal-provider:
            token-uri: http://localhost:8080/auth/api/v1/oauth/token

  datasource:
    url: jdbc:mysql://localhost:3306/taskengine_project
    #username: ${TASKENGINE_DB_PROJECT}
    #password: ${TASKENGINE_DB_PROJECT_PASSWORD}
    username: taskengine-project
    password: taskengine-project-password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web.client.RestTemplate: DEBUG
    org.springframework.cloud.openfeign: DEBUG