server:
  port: 8081

rabbitmq:
  exchange: ${RABBITMQ_EXCHANGE}
  queue: ${RABBITMQ_PROJECT_TASK_QUEUE}
  routing-key: ${RABBITMQ_ROUTING_KEY}

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  application:
    name: taskengine-task-service

  jackson:
    deserialization:
      fail-on-unknown-properties: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/auth/api/v1/.well-known/jwks.json

      client:
        registration:
          internal-client:
            provider: internal-provider
            client-id: ${TASK_SERVICE_CLIENTID}
            client-secret: ${TASK_SERVICE_CLIENTSECRET}
            #client-id: Task-Service
            #client-secret: Task-Service-0002
            authorization-grant-type: client_credentials
            client-authentication-method: client_secret_basic
            #client-authentication-method: client_secret_post
            scope: read ,write
        provider:
          internal-provider:
            token-uri: http://localhost:8080/auth/api/v1/oauth/token

  datasource:
    url: jdbc:mysql://localhost:3306/taskengine_task
    username: ${TASKENGINE_DB_TASK}
    password: ${TASKENGINE_DB_TASK_PASSWORD}
    #username: taskengine-task
    #assword: taskengine-task-password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
     hibernate:
      dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web.client.RestTemplate: DEBUG
    org.springframework.cloud.openfeign: DEBUG