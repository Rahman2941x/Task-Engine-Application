spring.application.name=taskengine-user-service

server.port=8080


#DB Connection
spring.datasource.url=jdbc:mysql://localhost:3306/taskengine_user
spring.datasource.username=${TASKENGINE_DB_USER}
spring.datasource.password=${TASKENGINE_DB_PASSWORD}

# SQl In Console
spring.jpa.show-sql=true

#Auto update
spring.jpa.hibernate.ddl-auto=update

#hibernate,dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#Security
spring.security.user.name=syed
spring.security.user.password=syed123

#Security Public and private key
security.jwt.private-key=${JWT_PRIVATE_KEY_PATH}
security.jwt.public-key=${JWT_PUBLIC_KEY_PATH}

#register with discovery
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

